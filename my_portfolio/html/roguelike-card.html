<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ローグライク・カードゲーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css_temp/card-game.css">
</head>

<body>
    <div id="game-container">
        <div class="battle-area" id="enemy-area">
            <div class="hp-bar">敵 HP: <span id="enemy-hp">50</span> / 50</div>
            <div id="enemy-sprite">👾</div> </div>

        <div id="message-log"></div>

        <div class="battle-area" id="player-area">
            <div id="player-sprite">🛡️ Player</div>
            <div class="hp-bar">自分 HP: <span id="player-hp">100</span> / 100</div>
            
            <div id="hand">
                </div>
        </div>
    </div>

    <script src="../js_temp/card-game.js"></script>
</body>
